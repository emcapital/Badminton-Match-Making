<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Pro-Court | Events</title>
    <style>
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #064e3b, #022c22, #065f46, #0f172a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
        }

        .sidebar-expanded { width: 280px; }
        .sidebar-collapsed { width: 90px; }
        .sidebar-transition { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .hide-text { 
            opacity: 0;
            display: none;
        }

        .tooltip {
            position: absolute;
            left: 100%;
            margin-left: 10px;
            padding: 4px 8px;
            background: #10b981;
            color: white;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        
        .sidebar-collapsed #logoToggle:hover .tooltip {
            opacity: 1;
        }

        #eventModal {
            backdrop-filter: blur(12px);
            display: none;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .filter-btn.active {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
    </style>
</head>
<body class="animated-bg text-slate-100 font-sans flex overflow-hidden">

    <!-- Event Modal (Handles both Create and Edit) -->
    <div id="eventModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/60">
        <div class="bg-white text-slate-900 w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl relative">
            <!-- Close Icon -->
            <button id="closeModal" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h3 id="modalTitle" class="text-3xl font-black uppercase italic tracking-tighter mb-6">Create Event</h3>
            
            <form id="eventForm" class="space-y-4">
                <input type="hidden" id="editEventId">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Event Name</label>
                    <input type="text" id="evName" required placeholder="e.g. SUMMER SMASH" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3 font-bold uppercase text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Event Date</label>
                    <input type="date" id="evDate" required class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3 font-bold uppercase text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Players / Team</label>
                        <input type="number" id="evPlayers" required placeholder="2" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3 font-bold uppercase text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Total Teams</label>
                        <input type="number" id="evTeams" required placeholder="8" class="w-full bg-slate-100 border-none rounded-2xl px-5 py-3 font-bold uppercase text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                    </div>
                </div>

                <div class="flex flex-col gap-3 mt-8">
                    <button type="submit" id="submitBtn" class="w-full bg-emerald-500 py-4 rounded-2xl font-black uppercase italic text-xs tracking-widest text-white shadow-lg shadow-emerald-200 hover:bg-emerald-400 transition-all">Create Event</button>
                    <button type="button" id="deleteBtn" class="hidden w-full py-3 text-[10px] font-black uppercase tracking-widest text-red-400 hover:text-red-600 transition-all">Delete Event</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded sidebar-transition h-screen bg-white/5 backdrop-blur-xl border-r border-white/10 flex flex-col z-40 relative">
        <button id="logoToggle" class="relative flex items-center gap-3 mb-10 mt-8 px-6 group outline-none">
            <div id="logoIconContainer" class="bg-emerald-500 p-2.5 rounded-xl shrink-0 shadow-[0_0_20px_rgba(16,185,129,0.4)] group-hover:bg-emerald-400 transition-all duration-300 flex items-center justify-center">
                <svg id="toggleSvg" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
            </div>
            <div class="sidebar-label flex flex-col items-start overflow-hidden transition-opacity duration-300 text-left">
                <h1 class="text-xl font-black uppercase tracking-tighter italic whitespace-nowrap">Pro-Court</h1>
                <span class="text-[9px] font-bold text-emerald-500 uppercase tracking-[0.2em] -mt-1">Collapse View</span>
            </div>
            <span class="tooltip">Expand Menu</span>
        </button>

        <nav class="flex-1 space-y-2 px-3">
            <a href="dashboard.html" class="flex items-center gap-4 px-4 py-4 rounded-xl text-slate-400 hover:bg-white/10 hover:text-white transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                <span class="sidebar-label">Dashboard</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-4 rounded-xl bg-emerald-500 text-white font-bold shadow-lg shadow-emerald-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" /></svg>
                <span class="sidebar-label">Events</span>
            </a>
            <a href="matches.html" class="flex items-center gap-4 px-4 py-4 rounded-xl text-slate-400 hover:bg-white/10 hover:text-white transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" /></svg>
                <span class="sidebar-label">Matches</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-4 rounded-xl text-slate-400 hover:bg-white/10 hover:text-white transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <span class="sidebar-label">Players</span>
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/10 px-3 pb-6">
            <div class="flex items-center gap-3 px-3 mb-6 overflow-hidden">
                <div class="w-10 h-10 shrink-0 rounded-full bg-emerald-500 flex items-center justify-center font-black text-white border-2 border-white/20">
                    <span id="userInitial">P</span>
                </div>
                <div class="sidebar-label">
                    <p id="userNameDisplay" class="text-sm font-bold truncate">Loading...</p>
                    <p id="userCityDisplay" class="text-[10px] text-slate-500 uppercase font-black italic">Scanning...</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full py-4 rounded-xl bg-red-500/10 text-red-500 font-bold hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                <span class="sidebar-label">Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-screen overflow-y-auto p-8">
        <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10">
            <div>
                <h2 class="text-4xl font-black uppercase italic tracking-tight">Events</h2>
                <p class="text-slate-400 font-medium italic">Manage and track your tournaments</p>
            </div>
            <button id="openModalBtn" class="bg-emerald-500 hover:bg-emerald-400 text-white font-black uppercase px-8 py-3 rounded-2xl shadow-lg shadow-emerald-900/40 transition-all text-sm italic">
                + Create Event
            </button>
        </header>

        <!-- Search and History Filter -->
        <div class="flex flex-col lg:flex-row gap-6 mb-10">
            <div class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 flex items-center gap-4 backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" id="searchInput" placeholder="SEARCH EVENTS..." class="bg-transparent border-none outline-none w-full font-bold uppercase text-xs tracking-widest placeholder:text-slate-600">
            </div>
            
            <div class="flex bg-white/5 border border-white/10 p-1.5 rounded-2xl backdrop-blur-sm">
                <button id="filterUpcoming" class="filter-btn active px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Upcoming</button>
                <button id="filterPast" class="filter-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-400 hover:text-white">Past Events</button>
            </div>
        </div>

        <!-- Event Grid -->
        <div id="eventsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFPXhzIelkHjNl-hUYJONlrgj8xgCnjUI",
            authDomain: "badminton-match-making.firebaseapp.com",
            databaseURL: "https://badminton-match-making-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "badminton-match-making",
            storageBucket: "badminton-match-making.firebasestorage.app",
            messagingSenderId: "592338098121",
            appId: "1:592338098121:web:cae00782619118a223fa18",
            measurementId: "G-K7MRNHCZDQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let allEvents = [];
        let currentFilter = 'upcoming'; // Default filter

        // UI Elements
        const sidebar = document.getElementById('sidebar');
        const logoToggle = document.getElementById('logoToggle');
        const labels = document.querySelectorAll('.sidebar-label');
        const eventModal = document.getElementById('eventModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModal = document.getElementById('closeModal');
        const eventForm = document.getElementById('eventForm');
        const eventsContainer = document.getElementById('eventsContainer');
        const searchInput = document.getElementById('searchInput');
        const modalTitle = document.getElementById('modalTitle');
        const submitBtn = document.getElementById('submitBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const editIdInput = document.getElementById('editEventId');
        const filterUpcoming = document.getElementById('filterUpcoming');
        const filterPast = document.getElementById('filterPast');

        // Sidebar logic
        logoToggle.addEventListener('click', () => {
            const isCollapsing = sidebar.classList.contains('sidebar-expanded');
            if (isCollapsing) {
                sidebar.classList.replace('sidebar-expanded', 'sidebar-collapsed');
                labels.forEach(l => l.classList.add('hide-text'));
                document.getElementById('toggleSvg').style.transform = 'rotate(180deg)';
            } else {
                sidebar.classList.replace('sidebar-collapsed', 'sidebar-expanded');
                setTimeout(() => labels.forEach(l => l.classList.remove('hide-text')), 150);
                document.getElementById('toggleSvg').style.transform = 'rotate(0deg)';
            }
        });

        // Modal Logic
        function openModal(editData = null) {
            eventForm.reset();
            if (editData) {
                modalTitle.innerText = "Edit Event";
                submitBtn.innerText = "Update Event";
                deleteBtn.classList.remove('hidden');
                editIdInput.value = editData.id;
                document.getElementById('evName').value = editData.name;
                document.getElementById('evDate').value = editData.date;
                document.getElementById('evPlayers').value = editData.playersPerTeam;
                document.getElementById('evTeams').value = editData.totalTeams;
            } else {
                modalTitle.innerText = "Create Event";
                submitBtn.innerText = "Create Event";
                deleteBtn.classList.add('hidden');
                editIdInput.value = "";
            }
            eventModal.style.display = 'flex';
        }

        openModalBtn.addEventListener('click', () => openModal());
        closeModal.addEventListener('click', () => eventModal.style.display = 'none');

        // Form Submit (Create & Update)
        eventForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = editIdInput.value;
            const eventData = {
                name: document.getElementById('evName').value,
                date: document.getElementById('evDate').value,
                playersPerTeam: document.getElementById('evPlayers').value,
                totalTeams: document.getElementById('evTeams').value,
                updatedAt: Date.now()
            };

            try {
                if (id) {
                    await update(ref(database, 'events/' + id), eventData);
                } else {
                    eventData.createdBy = auth.currentUser.uid;
                    eventData.createdAt = Date.now();
                    await push(ref(database, 'events'), eventData);
                }
                eventModal.style.display = 'none';
            } catch (err) {
                alert("Error: " + err.message);
            }
        });

        // Delete Logic
        deleteBtn.addEventListener('click', async () => {
            if(confirm("Are you sure you want to delete this event?")) {
                const id = editIdInput.value;
                await remove(ref(database, 'events/' + id));
                eventModal.style.display = 'none';
            }
        });

        // History Filter Logic
        function setFilter(type) {
            currentFilter = type;
            if (type === 'upcoming') {
                filterUpcoming.classList.add('active', 'text-white');
                filterPast.classList.remove('active', 'text-white');
                filterPast.classList.add('text-slate-400');
            } else {
                filterPast.classList.add('active', 'text-white');
                filterUpcoming.classList.remove('active', 'text-white');
                filterUpcoming.classList.add('text-slate-400');
            }
            filterAndRender();
        }

        filterUpcoming.addEventListener('click', () => setFilter('upcoming'));
        filterPast.addEventListener('click', () => setFilter('past'));

        // Combined Search and Filter
        function filterAndRender() {
            const searchTerm = searchInput.value.toLowerCase();
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const filtered = allEvents.filter(ev => {
                const eventDate = new Date(ev.date);
                eventDate.setHours(0, 0, 0, 0);
                
                const matchesSearch = ev.name.toLowerCase().includes(searchTerm);
                const isPast = eventDate < today;
                
                if (currentFilter === 'past') {
                    return matchesSearch && isPast;
                } else {
                    return matchesSearch && !isPast;
                }
            });

            renderEvents(filtered);
        }

        searchInput.addEventListener('input', filterAndRender);

        function renderEvents(eventsArray) {
            eventsContainer.innerHTML = '';
            
            if (eventsArray.length === 0) {
                eventsContainer.innerHTML = '<p class="text-slate-500 font-bold uppercase italic text-sm p-4">No events found in this section.</p>';
                return;
            }

            eventsArray.forEach(ev => {
                const dateObj = new Date(ev.date);
                const day = dateObj.getDate();
                const month = dateObj.toLocaleString('default', { month: 'short' });
                
                const today = new Date();
                today.setHours(0,0,0,0);
                const isDone = dateObj < today;

                const card = document.createElement('div');
                card.className = `bg-white/95 rounded-[2rem] p-8 text-slate-900 flex gap-6 items-start transition-all hover:translate-y-[-5px] shadow-xl ${isDone ? 'opacity-80' : ''}`;
                card.innerHTML = `
                    <div class="${isDone ? 'bg-slate-200' : 'bg-slate-100'} p-4 rounded-2xl flex flex-col items-center min-w-[80px]">
                        <span class="text-[10px] font-black text-slate-400 uppercase">${month}</span>
                        <span class="text-3xl font-black italic">${day}</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="text-xl font-black uppercase leading-tight italic">${ev.name}</h4>
                                <span class="text-[8px] font-black uppercase tracking-widest ${isDone ? 'text-slate-400' : 'text-emerald-500'}">
                                    ${isDone ? '● Completed' : '● Scheduled'}
                                </span>
                            </div>
                            <span class="text-[9px] font-black px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full border border-emerald-200 uppercase">${ev.totalTeams} Teams</span>
                        </div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-wide mb-6">Format: ${ev.playersPerTeam}v${ev.playersPerTeam}</p>
                        <div class="flex items-center gap-4">
                            <button class="edit-trigger text-sm font-black uppercase italic border-b-2 border-slate-900">Edit Event</button>
                        </div>
                    </div>
                `;
                card.querySelector('.edit-trigger').addEventListener('click', () => openModal(ev));
                eventsContainer.appendChild(card);
            });
        }

        // Real-time Fetch
        onValue(ref(database, 'events'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                allEvents = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                // Sort by date (nearest first for upcoming, latest first for past handled by filter logic)
                allEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                filterAndRender();
            } else {
                eventsContainer.innerHTML = '<p class="text-slate-500 font-bold uppercase italic text-sm p-4">No events found.</p>';
            }
        });

        // Auth & Profile
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                const snapshot = await get(ref(database, 'players/' + user.uid));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('userNameDisplay').innerText = data.fullName;
                    document.getElementById('userCityDisplay').innerText = data.city;
                    document.getElementById('userInitial').innerText = data.fullName.charAt(0).toUpperCase();
                }
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>

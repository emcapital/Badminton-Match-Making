<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Pro-Court | Join the League</title>
    <style>
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #064e3b, #022c22, #065f46, #0f172a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FULL SCREEN OVERLAY */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 44, 34, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .main-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="animated-bg p-4 overflow-x-hidden">

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="main-spinner"></div>
        <p class="text-emerald-500 font-black uppercase tracking-[0.3em] mt-6 animate-pulse">Syncing Profile...</p>
    </div>

    <!-- Signup Card -->
    <div id="signupCard" class="relative bg-white/95 backdrop-blur-sm p-8 rounded-3xl shadow-2xl w-full max-w-2xl border-b-8 border-emerald-500 transition-all duration-500">
        
        <!-- Back Button -->
        <a href="login.html" onclick="showLoader()" class="absolute top-6 left-6 text-slate-400 hover:text-emerald-600 flex items-center gap-1 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-xs font-black uppercase tracking-widest">Login</span>
        </a>

        <!-- Header -->
        <div class="text-center mb-8 mt-4">
            <div class="flex justify-center mb-4">
                <div class="bg-emerald-100 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tight">Player Registration</h1>
            <p class="text-slate-500 font-medium italic">Create your Pro-Court profile</p>
        </div>

        <!-- Form -->
        <form id="signupForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Full Name -->
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Email Address</label>
                    <input type="email" id="email" required placeholder="smash@prolink.com" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                </div>

                <!-- City -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">City</label>
                    <input type="text" id="city" required placeholder="Cebu City" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                </div>

                <!-- Password -->
                <div class="relative">
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Access Key</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                    <button type="button" id="togglePassword" class="absolute right-4 top-[42px] text-slate-400 hover:text-emerald-600 transition-colors">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                    </button>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Confirm Key</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••" 
                        class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                </div>
            </div>

            <!-- Password Security Feedback -->
            <div id="passwordSecurity" class="text-[10px] uppercase font-bold tracking-tighter text-slate-400 mt-2 px-2 flex flex-wrap gap-x-4 gap-y-1">
                <span id="req-length">● Min 8 Characters</span>
                <span id="req-match">● Keys Match</span>
            </div>

            <!-- Error Box -->
            <div id="errorBox" class="hidden bg-red-50 border-l-4 border-red-500 p-3 rounded">
                <p id="errorMessage" class="text-red-700 text-xs font-bold uppercase"></p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-widest rounded-xl transition-all duration-200 shadow-[0_4px_0_rgb(5,150,105)] active:shadow-none active:translate-y-1 disabled:opacity-70">
                <span id="btnContent">Create Account</span>
            </button>
        </form>
    </div>

    <!-- Firebase System -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFPXhzIelkHjNl-hUYJONlrgj8xgCnjUI",
            authDomain: "badminton-match-making.firebaseapp.com",
            databaseURL: "https://badminton-match-making-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "badminton-match-making",
            storageBucket: "badminton-match-making.firebasestorage.app",
            messagingSenderId: "592338098121",
            appId: "1:592338098121:web:cae00782619118a223fa18",
            measurementId: "G-K7MRNHCZDQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        const loader = document.getElementById('loadingOverlay');
        const signupForm = document.getElementById('signupForm');
        const passInput = document.getElementById('password');
        const confirmPassInput = document.getElementById('confirmPassword');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Loader Toggle Function
        window.showLoader = () => {
            loader.style.display = 'flex';
        };

        // Live validation
        const checkSecurity = () => {
            const lengthOk = passInput.value.length >= 8;
            const matchOk = passInput.value === confirmPassInput.value && passInput.value !== "";
            document.getElementById('req-length').style.color = lengthOk ? '#10b981' : '#94a3b8';
            document.getElementById('req-match').style.color = matchOk ? '#10b981' : '#94a3b8';
            return lengthOk && matchOk;
        };

        [passInput, confirmPassInput].forEach(input => input.addEventListener('input', checkSecurity));

        // Toggle visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
            const type = passInput.type === 'password' ? 'text' : 'password';
            passInput.type = type;
            confirmPassInput.type = type;
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!checkSecurity()) {
                errorBox.classList.remove('hidden');
                errorMessage.innerText = "Check password requirements.";
                return;
            }

            // Start Loading UI
            showLoader();
            submitBtn.disabled = true;

            // Define the 2-second forced delay
            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            const email = document.getElementById('email').value.trim();
            const password = passInput.value;
            const fullName = document.getElementById('fullName').value;
            const city = document.getElementById('city').value;

            try {
                // Perform Firebase actions
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await set(ref(database, 'players/' + user.uid), {
                    fullName: fullName,
                    email: email,
                    city: city,
                    joinedAt: new Date().toISOString()
                });

                // FORCED 2-SECOND WAIT for aesthetic effect
                await delay(2000);

                window.location.href = "../main/dashboard.html";
            } catch (error) {
                loader.style.display = 'none';
                errorBox.classList.remove('hidden');
                errorMessage.innerText = error.message;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

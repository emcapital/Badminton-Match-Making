<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Pro-Court | Secure Access</title>
    <style>
        /* 1. MOVING BACKGROUND ANIMATION */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #064e3b, #022c22, #065f46, #0f172a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. LOADING SPINNER */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Hide content until Auth check is complete */
        .auth-loading { visibility: hidden; }
    </style>
</head>
<body class="animated-bg p-4 overflow-hidden">

    <!-- Login Card -->
    <div id="loginCard" class="relative bg-white/95 backdrop-blur-sm p-8 rounded-3xl shadow-2xl w-full max-w-md border-b-8 border-emerald-500 transition-all duration-500">
        
        <!-- Back Button -->
        <a href="../index.html" class="absolute top-6 left-6 text-slate-400 hover:text-emerald-600 flex items-center gap-1 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-xs font-black uppercase tracking-widest">Back</span>
        </a>

        <!-- Badge Icon -->
        <div class="flex justify-center mb-6 mt-4">
            <div class="bg-emerald-100 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><path d="m8.5 8.5 7 7"/><path d="m8.5 15.5 7-7"/><path d="M12 7h.01"/><path d="M12 17h.01"/><path d="M7 12h.01"/><path d="M17 12h.01"/>
                </svg>
            </div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tight">Court Access</h1>
            <p class="text-slate-500 font-medium italic mt-1">Authorized Personnel Only</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-5">
            <!-- Email -->
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">Player ID / Email</label>
                <input type="email" id="email" required placeholder="smash@prolink.com" 
                    class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
            </div>

            <!-- Password with Show/Hide -->
            <div class="relative">
                <div class="flex justify-between mb-2 ml-1">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500">Access Key</label>
                    <a href="#" class="text-xs font-bold text-emerald-600 hover:text-emerald-700">Reset?</a>
                </div>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-4 rounded-xl bg-slate-100 border-2 border-transparent text-slate-900 focus:outline-none focus:border-emerald-500 focus:bg-white transition duration-200 font-medium">
                
                <!-- Eye Toggle Button -->
                <button type="button" id="togglePassword" class="absolute right-4 top-[42px] text-slate-400 hover:text-emerald-600 transition-colors">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path id="eyePath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>

            <!-- Error Message -->
            <div id="errorBox" class="hidden bg-red-50 border-l-4 border-red-500 p-3 rounded">
                <p id="errorMessage" class="text-red-700 text-xs font-bold uppercase"></p>
            </div>

            <div class="pt-2">
                <button type="submit" id="submitBtn"
                    class="group relative w-full py-4 px-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black uppercase tracking-widest rounded-xl transition-all duration-200 shadow-[0_4px_0_rgb(5,150,105)] active:shadow-none active:translate-y-1 disabled:opacity-70 disabled:cursor-not-allowed">
                    <span id="btnContent" class="flex items-center justify-center gap-3">
                        Enter Court
                    </span>
                </button>
            </div>
        </form>

        <div class="mt-10 pt-6 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-500 font-medium">
                New to the club? <a href="./signup.html" class="text-emerald-600 font-bold hover:underline">Join League</a>
            </p>
        </div>
    </div>

    <!-- Firebase System Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFPXhzIelkHjNl-hUYJONlrgj8xgCnjUI",
            authDomain: "badminton-match-making.firebaseapp.com",
            databaseURL: "https://badminton-match-making-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "badminton-match-making",
            storageBucket: "badminton-match-making.firebasestorage.app",
            messagingSenderId: "592338098121",
            appId: "1:592338098121:web:cae00782619118a223fa18",
            measurementId: "G-K7MRNHCZDQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnContent = document.getElementById('btnContent');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');

        // 1. ROUTE GUARD: Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If user is already authenticated, send them to dashboard
                // Replace "dashboard.html" with your actual protected page
                window.location.href = "../main/dashboard.html";
            }
        });

        // 2. SHOW/HIDE PASSWORD TOGGLE
        toggleBtn.addEventListener('click', () => {
            const isPassword = passInput.type === 'password';
            passInput.type = isPassword ? 'text' : 'password';
            toggleBtn.classList.toggle('text-emerald-600');
        });

        // 3. SECURE LOGIN SUBMISSION
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI State: Loading
            submitBtn.disabled = true;
            errorBox.classList.add('hidden');
            btnContent.innerHTML = `<span class="spinner"></span> <span>Verifying...</span>`;

            const email = document.getElementById('email').value.trim();
            const password = passInput.value;

            try {
                // Ensure persistence is set
                await setPersistence(auth, browserLocalPersistence);
                
                // Firebase Auth Call
                await signInWithEmailAndPassword(auth, email, password);
                
                // Navigation happens via onAuthStateChanged or directly here
                window.location.href = "../main/dashboard.html";
            } catch (error) {
                errorBox.classList.remove('hidden');
                
                // Secure Error Messaging
                switch (error.code) {
                    case 'auth/too-many-requests':
                        errorMessage.innerText = "Too many attempts. Locked for security.";
                        break;
                    case 'auth/invalid-credential':
                        errorMessage.innerText = "Invalid Email or Access Key.";
                        break;
                    default:
                        errorMessage.innerText = "Access Denied. Check connection.";
                }

                // Reset Button
                submitBtn.disabled = false;
                btnContent.innerHTML = `Enter Court`;
            }
        });
    </script>
</body>
</html>
